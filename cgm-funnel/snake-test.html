<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Snake M Animation Test — v6 Premium</title>
<style>
  body {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; margin: 0;
    background: #f5f5f5; font-family: Inter, -apple-system, sans-serif;
  }
  canvas { width: 64px; height: 64px; display: block; }
  .controls { margin-top: 24px; display: flex; gap: 10px; }
  button {
    padding: 8px 20px; border: none; border-radius: 8px;
    background: #0e7c6b; color: white; font-size: 14px; cursor: pointer;
  }
  button:hover { opacity: 0.9; }
  .label { color: #666; font-size: 13px; margin-top: 8px; }
  .badge-test {
    margin-top: 40px; padding: 30px; background: white;
    border-radius: 16px; text-align: center;
  }
  .benefits-badge-centered {
    display: inline-flex; align-items: center; justify-content: center;
    width: 52px; height: 52px; background: #eef8f6; border-radius: 14px;
  }
</style>
</head>
<body>

<h3 style="color:#0f2b3c; margin-bottom:4px;">Snake M — Premium v6</h3>
<p class="label">Eased draw, shadow glow, smooth transitions</p>

<canvas id="snakeCanvas" width="128" height="128"></canvas>
<p class="label" id="phaseLabel">Phase: —</p>

<div class="controls">
  <button onclick="restart()">Restart</button>
  <button onclick="ctrl.showM()">Force M</button>
</div>

<div class="badge-test">
  <p class="label" style="margin-bottom:12px">Benefits Badge:</p>
  <div class="benefits-badge-centered">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="2" width="24" height="24" rx="5" stroke="#0e7c6b" stroke-width="2"/>
      <path d="M8.5 16L12 19.5L19.5 12" stroke="#0e7c6b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
</div>

<script>
var ctrl, snakeAnim;

function startSnakeAnimation() {
  var canvas = document.getElementById('snakeCanvas');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var W = 128, H = 128;
  var teal = '#0e7c6b';
  var lineW = 6;

  // M shape waypoints — refined proportions
  // Slightly wider stance, shallower V for a more modern/balanced feel
  var mPts = [
    {x: 18, y: 100},   // bottom-left
    {x: 18, y: 26},    // top-left
    {x: 64, y: 68},    // center-V (shallower = more elegant)
    {x: 110, y: 26},   // top-right
    {x: 110, y: 100}   // bottom-right
  ];

  // Pre-compute path geometry
  function dist(a, b) { return Math.sqrt((b.x-a.x)*(b.x-a.x)+(b.y-a.y)*(b.y-a.y)); }

  var segLens = [], totalLen = 0;
  for (var i = 1; i < mPts.length; i++) {
    var d = dist(mPts[i-1], mPts[i]);
    segLens.push(d);
    totalLen += d;
  }

  function pointAtDist(d) {
    d = Math.max(0, Math.min(d, totalLen));
    var acc = 0;
    for (var i = 0; i < segLens.length; i++) {
      if (acc + segLens[i] >= d) {
        var f = (d - acc) / segLens[i];
        return {x: mPts[i].x+(mPts[i+1].x-mPts[i].x)*f, y: mPts[i].y+(mPts[i+1].y-mPts[i].y)*f};
      }
      acc += segLens[i];
    }
    return {x: mPts[mPts.length-1].x, y: mPts[mPts.length-1].y};
  }

  // Build high-res path arrays
  var N = 200; // more points = smoother curves
  var pathLR = [];
  for (var i = 0; i <= N; i++) pathLR.push(pointAtDist((i / N) * totalLen));
  var pathRL = pathLR.slice().reverse();

  // ---- Easing functions ----
  function easeInOutCubic(t) {
    return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;
  }
  // Smoother ease with slight overshoot feel
  function easeOutQuart(t) {
    return 1 - Math.pow(1 - t, 4);
  }

  // ---- Animation state ----
  // 8 phases: draw, hold, undraw, pause × 2 directions
  var phase = 0;
  var rawProgress = 0;  // linear 0–1
  var drawDuration = 900;   // ms — slightly slower for elegance
  var holdDuration = 2000;  // ms
  var pauseDuration = 200;  // ms — shorter, smoother
  var phaseTime = 0;
  var lastTime = 0;
  var running = true, forceM = false;

  // Blend factor for smooth transitions between phases
  var blendIn = 0;    // 0–1, ramps up at start of draw
  var blendOut = 1;   // 1–0, ramps down at end of undraw

  var phaseNames = [
    'draw L→R', 'hold', 'undraw L→R', 'pause',
    'draw R→L', 'hold', 'undraw R→L', 'pause'
  ];

  function animate(time) {
    if (!running) return;
    if (!lastTime) lastTime = time;
    var dt = Math.min(time - lastTime, 50);
    lastTime = time;

    if (forceM) { drawStaticM(); snakeAnim = requestAnimationFrame(animate); return; }

    phaseTime += dt;

    var path = (phase < 4) ? pathLR : pathRL;

    switch (phase) {
      case 0: case 4: // DRAW
        rawProgress = Math.min(phaseTime / drawDuration, 1);
        var eased = easeInOutCubic(rawProgress);
        var headIdx = Math.round(eased * N);

        // Smooth fade-in for the first 15% of the draw
        blendIn = Math.min(rawProgress / 0.15, 1);

        drawSnakePath(path, 0, headIdx, blendIn);

        if (rawProgress >= 1) {
          phase = (phase === 0) ? 1 : 5;
          phaseTime = 0;
          rawProgress = 0;
        }
        break;

      case 1: case 5: // HOLD with glow
        // Smooth transition into glow (first 250ms)
        var glowBlend = Math.min(phaseTime / 250, 1);
        drawGlowingM(phaseTime, glowBlend);

        if (phaseTime >= holdDuration) {
          phase = (phase === 1) ? 2 : 6;
          phaseTime = 0;
          rawProgress = 0;
        }
        break;

      case 2: case 6: // UNDRAW
        rawProgress = Math.min(phaseTime / drawDuration, 1);
        var eased = easeInOutCubic(rawProgress);
        var tailIdx = Math.round(eased * N);

        // Smooth fade-out for the last 15% of the undraw
        blendOut = 1 - Math.max((rawProgress - 0.85) / 0.15, 0);

        drawSnakePath(path, tailIdx, N, blendOut);

        if (rawProgress >= 1) {
          phase = (phase === 2) ? 3 : 7;
          phaseTime = 0;
          rawProgress = 0;
        }
        break;

      case 3: case 7: // PAUSE
        ctx.clearRect(0, 0, W, H);
        if (phaseTime >= pauseDuration) {
          phase = (phase === 3) ? 4 : 0;
          phaseTime = 0;
          rawProgress = 0;
        }
        break;
    }

    var label = document.getElementById('phaseLabel');
    if (label) label.textContent = 'Phase: ' + phaseNames[phase];

    snakeAnim = requestAnimationFrame(animate);
  }

  // ---- Clean uniform line renderer ----
  function drawSnakePath(path, startIdx, endIdx, masterAlpha) {
    ctx.clearRect(0, 0, W, H);
    if (endIdx <= startIdx + 1) return;

    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.lineWidth = lineW;
    ctx.strokeStyle = teal;
    ctx.globalAlpha = masterAlpha;

    // Single uniform-weight path — no gradient, no taper
    ctx.beginPath();
    ctx.moveTo(path[startIdx].x, path[startIdx].y);
    for (var i = startIdx + 1; i <= endIdx; i++) {
      ctx.lineTo(path[i].x, path[i].y);
    }
    ctx.stroke();

    ctx.globalAlpha = 1;
  }

  // ---- Premium glow renderer ----
  function drawGlowingM(t, blendIn) {
    ctx.clearRect(0, 0, W, H);

    // Breathing pulse: smooth sin wave, ~1.2s cycle
    var breathe = (Math.sin(t * Math.PI * 2 / 1200 - Math.PI/2) + 1) / 2; // 0–1

    // Shadow-based glow (much more natural than thick stroke)
    ctx.save();
    ctx.strokeStyle = teal;
    ctx.lineWidth = lineW;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    // Outer glow layer using shadow
    var glowIntensity = 0.08 + breathe * 0.12; // 0.08–0.20
    var glowSize = 6 + breathe * 8; // 6–14px blur

    ctx.shadowColor = teal;
    ctx.shadowBlur = glowSize * blendIn;
    ctx.globalAlpha = glowIntensity * blendIn;

    ctx.beginPath();
    ctx.moveTo(mPts[0].x, mPts[0].y);
    for (var i = 1; i < mPts.length; i++) ctx.lineTo(mPts[i].x, mPts[i].y);
    ctx.stroke();

    // Second glow pass for richer bloom
    ctx.shadowBlur = glowSize * 2 * blendIn;
    ctx.globalAlpha = glowIntensity * 0.5 * blendIn;
    ctx.stroke();

    ctx.restore();

    // Solid M on top (no shadow)
    ctx.strokeStyle = teal;
    ctx.lineWidth = lineW;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.globalAlpha = 1;
    ctx.beginPath();
    ctx.moveTo(mPts[0].x, mPts[0].y);
    for (var i = 1; i < mPts.length; i++) ctx.lineTo(mPts[i].x, mPts[i].y);
    ctx.stroke();

    ctx.globalAlpha = 1;
  }

  // ---- Static M for final state ----
  function drawStaticM() {
    ctx.clearRect(0, 0, W, H);

    // Subtle permanent glow
    ctx.save();
    ctx.strokeStyle = teal;
    ctx.lineWidth = lineW;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.shadowColor = teal;
    ctx.shadowBlur = 8;
    ctx.globalAlpha = 0.15;
    ctx.beginPath();
    ctx.moveTo(mPts[0].x, mPts[0].y);
    for (var i = 1; i < mPts.length; i++) ctx.lineTo(mPts[i].x, mPts[i].y);
    ctx.stroke();
    ctx.restore();

    ctx.strokeStyle = teal;
    ctx.lineWidth = lineW;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.globalAlpha = 1;
    ctx.beginPath();
    ctx.moveTo(mPts[0].x, mPts[0].y);
    for (var i = 1; i < mPts.length; i++) ctx.lineTo(mPts[i].x, mPts[i].y);
    ctx.stroke();
  }

  running = true;
  forceM = false;
  snakeAnim = requestAnimationFrame(animate);

  return {
    stop: function() { running = false; if (snakeAnim) cancelAnimationFrame(snakeAnim); },
    showM: function() { forceM = true; }
  };
}

function restart() { if (ctrl) ctrl.stop(); ctrl = startSnakeAnimation(); }
ctrl = startSnakeAnimation();
</script>
</body>
</html>
