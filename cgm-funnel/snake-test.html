<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Dual-M Snake Animation — Logo Match</title>
<style>
  body {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; margin: 0;
    background: #f5f5f5; font-family: Inter, -apple-system, sans-serif;
  }
  .canvas-wrap {
    position: relative;
    width: 128px;
    height: 128px;
  }
  .canvas-wrap canvas {
    position: absolute;
    top: 0; left: 0;
    width: 128px;
    height: 128px;
  }
  .controls { margin-top: 24px; display: flex; gap: 10px; }
  button {
    padding: 8px 20px; border: none; border-radius: 8px;
    background: #0e7c6b; color: white; font-size: 14px; cursor: pointer;
  }
  button:hover { opacity: 0.9; }
  .label { color: #666; font-size: 13px; margin-top: 8px; }

  .side-by-side {
    display: flex; align-items: flex-start; gap: 40px; margin-top: 30px;
  }
  .compare-box { text-align: center; }
</style>
</head>
<body>

<h3 style="color:#0f2b3c; margin-bottom:4px;">Dual-M Snake Animation</h3>
<p class="label">Matching the Medically Modern logo — from scratch</p>

<div class="canvas-wrap" id="canvasWrap">
  <canvas id="backCanvas" width="256" height="256"></canvas>
  <canvas id="frontCanvas" width="256" height="256"></canvas>
</div>
<p class="label" id="phaseLabel">Phase: —</p>

<div class="controls">
  <button onclick="restart()">Restart</button>
  <button onclick="showFinal()">Show Final</button>
</div>

<div class="side-by-side">
  <div class="compare-box">
    <p class="label" style="margin-bottom:8px">Static render</p>
    <div class="canvas-wrap" style="width:128px;height:128px;">
      <canvas id="staticBack" width="256" height="256" style="position:absolute;top:0;left:0;width:128px;height:128px;"></canvas>
      <canvas id="staticFront" width="256" height="256" style="position:absolute;top:0;left:0;width:128px;height:128px;"></canvas>
    </div>
  </div>
  <div class="compare-box">
    <p class="label" style="margin-bottom:8px">Header logo (reference)</p>
    <img src="https://medicallymodern.com/wp-content/uploads/2025/08/logo-1-1024x333.png" style="height:80px;" alt="Logo reference">
  </div>
</div>

<script>
(function() {
  'use strict';

  // ============================================================
  // COMPLETE REWRITE — pixel-matching the Medically Modern logo
  // ============================================================
  //
  // KEY FINDINGS from zoomed logo analysis:
  //   1. The M uses MITER joins (sharp pointed peaks), NOT round
  //   2. The M uses BUTT caps (flat ends), NOT round
  //   3. The M is WIDER than tall (aspect ratio ~1.1:1)
  //   4. The V notch goes to ~65% depth from the top
  //   5. Two M layers: back (lighter teal, offset left+up) and front (darker teal)
  //   6. Each M arm is a filled polygon shape (thick stroke with miter joins)
  //
  // Canvas: 256x256 internal, displayed at 128x128

  var W = 256, H = 256;

  // --- M GEOMETRY ---
  // Derived from careful measurement of the logo at 4x zoom.
  // The logo M in its natural 1024x333 PNG spans roughly:
  //   width ~330px, height ~300px, making it wider than tall.
  //   V notch at ~65% from top.
  //   Stroke width ~28px natural (~9% of M width).
  //
  // Mapping to 256x256 canvas (M centered, taking ~85% of space):

  // CRITICAL: The two M's are DIFFERENT SIZES.
  // The front (darker) M is WIDER than the back (lighter) M.
  // The back M is narrower and positioned further left.
  // The front M is the dominant, wider shape.

  // Front M (darker teal, WIDER + SHORTER, drawn ON TOP)
  // Centered at x=100 (same as back M!) — V directly below back M's V
  // Legs extend OUTSIDE back M on both sides
  // Shorter height than back M
  var frontM = [
    {x: -4,  y: 210},  // bottom-left  (outside back M's x=6)
    {x: -4,  y: 42},   // top-left     (shorter: starts 18px lower than back M's 24)
    {x: 100, y: 152},  // center-V     (directly below back M's V at (100,147))
    {x: 204, y: 42},   // top-right    (outside back M's x=194)
    {x: 204, y: 210}   // bottom-right (shorter: ends 12px higher than back M's 222)
  ];
  // Width: 204-(-4) = 208.  Height: 210-42 = 168.
  // Back M width: 188. Front extends 10px beyond on each side.
  // Back M height: 198. Front is 30px shorter.
  // Both V centers at x=100. Front V 5px below back V.

  // Back M (lighter teal, NARROWER, shifted LEFT, drawn BEHIND)
  var backM = [
    {x: 6,   y: 222},  // bottom-left
    {x: 6,   y: 24},   // top-left
    {x: 100, y: 147},  // center-V
    {x: 194, y: 24},   // top-right
    {x: 194, y: 222}   // bottom-right
  ];
  // Width: 194-6 = 188 (narrower than front M's 208)

  // --- COLORS ---
  // Sampled from zoomed logo analysis:
  //   Front M: medium-dark teal (logo shows a softer shade than pure brand teal)
  //   Back M: light teal
  var frontColor = '#6aada1';
  var backColor  = '#a8cec6';

  // --- STROKE ---
  // The logo strokes are about 9% of M width.  192 * 0.09 = ~17
  var lineW = 20;

  // ---- Path utilities ----
  function dist(a, b) {
    var dx = b.x - a.x, dy = b.y - a.y;
    return Math.sqrt(dx*dx + dy*dy);
  }

  // Build a densely sampled path from waypoints
  function buildPath(pts) {
    var segLens = [], totalLen = 0;
    for (var i = 1; i < pts.length; i++) {
      var d = dist(pts[i-1], pts[i]);
      segLens.push(d);
      totalLen += d;
    }
    function pointAt(d) {
      d = Math.max(0, Math.min(d, totalLen));
      var acc = 0;
      for (var i = 0; i < segLens.length; i++) {
        if (acc + segLens[i] >= d) {
          var f = (d - acc) / segLens[i];
          return {
            x: pts[i].x + (pts[i+1].x - pts[i].x) * f,
            y: pts[i].y + (pts[i+1].y - pts[i].y) * f,
            seg: i // which segment we're on (for miter join rendering)
          };
        }
        acc += segLens[i];
      }
      return {x: pts[pts.length-1].x, y: pts[pts.length-1].y, seg: segLens.length - 1};
    }

    // Also store cumulative distances at each waypoint for join detection
    var waypointDists = [0];
    var acc = 0;
    for (var i = 0; i < segLens.length; i++) {
      acc += segLens[i];
      waypointDists.push(acc);
    }

    var N = 300; // higher density for smoother animation
    var path = [];
    for (var i = 0; i <= N; i++) path.push(pointAt((i / N) * totalLen));
    return { path: path, pts: pts, N: N, totalLen: totalLen, waypointDists: waypointDists };
  }

  var backPathData  = buildPath(backM);
  var frontPathData = buildPath(frontM);

  // ---- Easing ----
  function easeInOutCubic(t) {
    return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;
  }

  // ============================================================
  // RENDERING — using miter joins + butt caps to match the logo
  // ============================================================

  function configureCtx(ctx) {
    ctx.lineCap = 'butt';     // FLAT ends — matches logo
    ctx.lineJoin = 'miter';   // SHARP corners — matches logo
    ctx.miterLimit = 20;      // Allow sharp points at the M peaks
    ctx.lineWidth = lineW;
  }

  // Draw full static M
  function drawStaticM(ctx, pts, color) {
    ctx.clearRect(0, 0, W, H);
    configureCtx(ctx);
    ctx.strokeStyle = color;
    ctx.globalAlpha = 1;
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (var i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.stroke();
  }

  // Draw partial M path (for snake animation)
  // Uses the dense sampled path but draws using WAYPOINT segments
  // so that miter joins render correctly at the corners.
  function drawPartialM(ctx, pathData, startFrac, endFrac, color, alpha) {
    ctx.clearRect(0, 0, W, H);
    if (endFrac <= startFrac + 0.005) return;

    configureCtx(ctx);
    ctx.strokeStyle = color;
    ctx.globalAlpha = alpha;

    var totalLen = pathData.totalLen;
    var startDist = startFrac * totalLen;
    var endDist = endFrac * totalLen;
    var pts = pathData.pts;
    var wpDists = pathData.waypointDists;

    // Build the sub-path from startDist to endDist,
    // including exact waypoints for correct miter joins
    var subPoints = [];

    // Find the start point
    subPoints.push(interpPoint(pts, wpDists, startDist));

    // Add all waypoints between start and end
    for (var i = 1; i < pts.length - 1; i++) {
      if (wpDists[i] > startDist && wpDists[i] < endDist) {
        subPoints.push({x: pts[i].x, y: pts[i].y});
      }
    }

    // Add the end point
    subPoints.push(interpPoint(pts, wpDists, endDist));

    // Draw the sub-path
    if (subPoints.length >= 2) {
      ctx.beginPath();
      ctx.moveTo(subPoints[0].x, subPoints[0].y);
      for (var i = 1; i < subPoints.length; i++) {
        ctx.lineTo(subPoints[i].x, subPoints[i].y);
      }
      ctx.stroke();
    }

    ctx.globalAlpha = 1;
  }

  // Interpolate a point along the M path at a given distance
  function interpPoint(pts, wpDists, dist) {
    for (var i = 0; i < wpDists.length - 1; i++) {
      if (dist >= wpDists[i] && dist <= wpDists[i+1]) {
        var segLen = wpDists[i+1] - wpDists[i];
        var f = segLen > 0 ? (dist - wpDists[i]) / segLen : 0;
        return {
          x: pts[i].x + (pts[i+1].x - pts[i].x) * f,
          y: pts[i].y + (pts[i+1].y - pts[i].y) * f
        };
      }
    }
    return {x: pts[pts.length-1].x, y: pts[pts.length-1].y};
  }

  // Draw M with subtle glow (hold phase)
  function drawGlowM(ctx, pts, color, t, blendIn) {
    ctx.clearRect(0, 0, W, H);
    var breathe = (Math.sin(t * Math.PI * 2 / 1200 - Math.PI/2) + 1) / 2;

    ctx.save();
    configureCtx(ctx);
    ctx.strokeStyle = color;

    var glowIntensity = 0.06 + breathe * 0.10;
    var glowSize = 4 + breathe * 6;

    ctx.shadowColor = color;
    ctx.shadowBlur = glowSize * blendIn;
    ctx.globalAlpha = glowIntensity * blendIn;
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (var i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.stroke();

    ctx.shadowBlur = glowSize * 2 * blendIn;
    ctx.globalAlpha = glowIntensity * 0.5 * blendIn;
    ctx.stroke();
    ctx.restore();

    // Solid on top
    configureCtx(ctx);
    ctx.strokeStyle = color;
    ctx.globalAlpha = 1;
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (var i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.stroke();
  }

  // ============================================================
  // ANIMATION ENGINE — 16-phase sequential cycle
  // ============================================================
  // L→R cycle: back draw → gap → front draw → hold → front undraw → gap → back undraw → pause
  // R→L cycle: same but reversed direction
  // Total: 16 phases

  var backCanvas  = document.getElementById('backCanvas');
  var frontCanvas = document.getElementById('frontCanvas');
  var backCtx     = backCanvas.getContext('2d');
  var frontCtx    = frontCanvas.getContext('2d');

  var drawDur  = 900;
  var holdDur  = 2000;
  var gapDur   = 100;
  var pauseDur = 300;

  var phase = 0, phaseTime = 0, lastTime = 0;
  var running = true, forceFinal = false, animId;

  var phaseNames = [
    'back draw L\u2192R','gap','front draw L\u2192R','hold (glow)',
    'front undraw L\u2192R','gap','back undraw L\u2192R','pause',
    'back draw R\u2192L','gap','front draw R\u2192L','hold (glow)',
    'front undraw R\u2192L','gap','back undraw R\u2192L','pause'
  ];

  function phaseDuration(p) {
    if (p === 3 || p === 11) return holdDur;
    if (p === 1 || p === 5 || p === 9 || p === 13) return gapDur;
    if (p === 7 || p === 15) return pauseDur;
    return drawDur;
  }

  function animate(time) {
    if (!running) return;
    if (!lastTime) lastTime = time;
    var dt = Math.min(time - lastTime, 50);
    lastTime = time;

    if (forceFinal) {
      drawStaticM(backCtx, backM, backColor);
      drawStaticM(frontCtx, frontM, frontColor);
      animId = requestAnimationFrame(animate);
      return;
    }

    phaseTime += dt;
    var dur = phaseDuration(phase);
    var progress = Math.min(phaseTime / dur, 1);
    var eased = easeInOutCubic(progress);

    // For R→L direction, we reverse the fraction (draw from 1→0 instead of 0→1)
    var isReverse = phase >= 8;

    switch (phase) {
      // DRAW BACK
      case 0: case 8:
        if (!isReverse) {
          drawPartialM(backCtx, backPathData, 0, eased, backColor, 1);
        } else {
          drawPartialM(backCtx, backPathData, 1 - eased, 1, backColor, 1);
        }
        frontCtx.clearRect(0, 0, W, H);
        break;

      // GAP (back fully drawn, front about to start)
      case 1: case 9:
        drawStaticM(backCtx, backM, backColor);
        frontCtx.clearRect(0, 0, W, H);
        break;

      // DRAW FRONT
      case 2: case 10:
        drawStaticM(backCtx, backM, backColor);
        if (!isReverse) {
          drawPartialM(frontCtx, frontPathData, 0, eased, frontColor, 1);
        } else {
          drawPartialM(frontCtx, frontPathData, 1 - eased, 1, frontColor, 1);
        }
        break;

      // HOLD WITH GLOW
      case 3: case 11:
        var glowBlend = Math.min(phaseTime / 250, 1);
        drawGlowM(backCtx, backM, backColor, phaseTime, glowBlend);
        drawGlowM(frontCtx, frontM, frontColor, phaseTime, glowBlend);
        break;

      // UNDRAW FRONT
      case 4: case 12:
        drawStaticM(backCtx, backM, backColor);
        if (!isReverse) {
          drawPartialM(frontCtx, frontPathData, eased, 1, frontColor, 1);
        } else {
          drawPartialM(frontCtx, frontPathData, 0, 1 - eased, frontColor, 1);
        }
        break;

      // GAP (front gone, back about to undraw)
      case 5: case 13:
        drawStaticM(backCtx, backM, backColor);
        frontCtx.clearRect(0, 0, W, H);
        break;

      // UNDRAW BACK
      case 6: case 14:
        if (!isReverse) {
          drawPartialM(backCtx, backPathData, eased, 1, backColor, 1);
        } else {
          drawPartialM(backCtx, backPathData, 0, 1 - eased, backColor, 1);
        }
        frontCtx.clearRect(0, 0, W, H);
        break;

      // PAUSE
      case 7: case 15:
        backCtx.clearRect(0, 0, W, H);
        frontCtx.clearRect(0, 0, W, H);
        break;
    }

    if (progress >= 1) {
      phase = (phase + 1) % 16;
      phaseTime = 0;
    }

    document.getElementById('phaseLabel').textContent = 'Phase: ' + phaseNames[phase];
    animId = requestAnimationFrame(animate);
  }

  // ---- Static comparison render ----
  function renderStatic() {
    var sb = document.getElementById('staticBack').getContext('2d');
    var sf = document.getElementById('staticFront').getContext('2d');
    drawStaticM(sb, backM, backColor);
    drawStaticM(sf, frontM, frontColor);
  }

  // ---- Controls ----
  window.restart = function() {
    if (animId) cancelAnimationFrame(animId);
    running = true; forceFinal = false;
    phase = 0; phaseTime = 0; lastTime = 0;
    backCtx.clearRect(0, 0, W, H);
    frontCtx.clearRect(0, 0, W, H);
    animId = requestAnimationFrame(animate);
  };
  window.showFinal = function() { forceFinal = true; };

  // Boot
  renderStatic();
  animId = requestAnimationFrame(animate);

})();
</script>
</body>
</html>
