<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Snake M Animation Test</title>
<style>
  body {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; margin: 0;
    background: #f5f5f5; font-family: Inter, sans-serif;
  }
  .verify-icon-wrap {
    width: 80px; height: 80px; background: #eef8f6;
    border-radius: 50%; display: flex; align-items: center;
    justify-content: center; margin-bottom: 20px;
  }
  canvas { width: 64px; height: 64px; display: block; }
  .controls { margin-top: 24px; display: flex; gap: 10px; }
  button {
    padding: 8px 20px; border: none; border-radius: 8px;
    background: #0e7c6b; color: white; font-size: 14px; cursor: pointer;
  }
  button:hover { opacity: 0.9; }
  .label { color: #666; font-size: 13px; margin-top: 8px; }
  .badge-test {
    margin-top: 40px; padding: 30px; background: white;
    border-radius: 16px; text-align: center;
  }
  .benefits-badge-centered {
    display: inline-flex; align-items: center; justify-content: center;
    width: 52px; height: 52px; background: #eef8f6; border-radius: 14px;
  }
</style>
</head>
<body>

<h3 style="color:#0f2b3c; margin-bottom:4px;">Snake M — Teeter-Totter v5</h3>
<p class="label">Draw left→right, hold, undraw left→right, draw right→left, hold, undraw right→left, repeat</p>

<div class="verify-icon-wrap">
  <canvas id="snakeCanvas" width="128" height="128"></canvas>
</div>
<p class="label" id="phaseLabel">Phase: —</p>

<div class="controls">
  <button onclick="restart()">Restart</button>
  <button onclick="ctrl.showM()">Force M</button>
</div>

<div class="badge-test">
  <p class="label" style="margin-bottom:12px">Benefits Badge:</p>
  <div class="benefits-badge-centered">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#0e7c6b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="3"/>
      <path d="M9 12l2 2 4-4"/>
    </svg>
  </div>
</div>

<script>
var ctrl, snakeAnim;

function startSnakeAnimation() {
  var canvas = document.getElementById('snakeCanvas');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var W = 128, H = 128;
  var teal = '#0e7c6b';
  var lineW = 7;

  // M shape waypoints
  var mPts = [
    {x: 20, y: 100},  // bottom-left
    {x: 20, y: 28},   // top-left
    {x: 64, y: 72},   // center-V
    {x: 108, y: 28},  // top-right
    {x: 108, y: 100}  // bottom-right
  ];

  function dist(a, b) { return Math.sqrt((b.x-a.x)*(b.x-a.x)+(b.y-a.y)*(b.y-a.y)); }

  // Build M path as evenly-spaced points for smooth drawing
  var mSegLens = [], totalMLen = 0;
  for (var i = 1; i < mPts.length; i++) {
    var d = dist(mPts[i-1], mPts[i]);
    mSegLens.push(d);
    totalMLen += d;
  }

  function mPointAtDist(d) {
    d = Math.max(0, Math.min(d, totalMLen));
    var acc = 0;
    for (var i = 0; i < mSegLens.length; i++) {
      if (acc + mSegLens[i] >= d) {
        var f = (d - acc) / mSegLens[i];
        return {x: mPts[i].x+(mPts[i+1].x-mPts[i].x)*f, y: mPts[i].y+(mPts[i+1].y-mPts[i].y)*f};
      }
      acc += mSegLens[i];
    }
    return {x: mPts[4].x, y: mPts[4].y};
  }

  // Pre-compute evenly spaced path points (for both directions)
  var numPts = 120;
  var pathLR = []; // left-to-right
  for (var i = 0; i <= numPts; i++) {
    pathLR.push(mPointAtDist((i / numPts) * totalMLen));
  }
  // Right-to-left is just reversed
  var pathRL = pathLR.slice().reverse();

  // --- Animation state ---
  // Phases:
  //  0: draw L→R  (head advances, tail stays at start)
  //  1: hold full M
  //  2: undraw L→R (tail advances to catch head, head stays at end)
  //  3: pause (empty)
  //  4: draw R→L
  //  5: hold full M
  //  6: undraw R→L
  //  7: pause (empty)
  var phase = 0;
  var progress = 0; // 0-1, how far through current draw/undraw
  var drawSpeed = 1.0 / 800; // fraction per ms (800ms to draw full M)
  var holdDuration = 2500; // ms (2.5s with glow pulse)
  var pauseDuration = 300; // ms between undraw and next draw
  var phaseTime = 0;
  var lastTime = 0;
  var running = true, forceM = false;

  var phaseNames = [
    'draw L→R', 'hold', 'undraw L→R', 'pause',
    'draw R→L', 'hold', 'undraw R→L', 'pause'
  ];

  function animate(time) {
    if (!running) return;
    if (!lastTime) lastTime = time;
    var dt = Math.min(time - lastTime, 50);
    lastTime = time;

    if (forceM) { drawFullM(); snakeAnim = requestAnimationFrame(animate); return; }

    phaseTime += dt;

    var path = (phase < 4) ? pathLR : pathRL;
    var headIdx, tailIdx;

    switch (phase) {
      case 0: // Draw L→R: head advances from 0 to numPts, tail fixed at 0
      case 4: // Draw R→L: same logic with reversed path
        progress += drawSpeed * dt;
        if (progress >= 1) {
          progress = 1;
          phase = (phase === 0) ? 1 : 5;
          phaseTime = 0;
        }
        headIdx = Math.round(progress * numPts);
        tailIdx = 0;
        drawSegment(path, tailIdx, headIdx);
        break;

      case 1: // Hold (after L→R draw) — with glow pulse
      case 5: // Hold (after R→L draw)
        drawGlowingM(phaseTime);
        if (phaseTime >= holdDuration) {
          phase = (phase === 1) ? 2 : 6;
          phaseTime = 0;
          progress = 0;
        }
        break;

      case 2: // Undraw L→R: tail advances from 0 to numPts, head fixed at end
      case 6: // Undraw R→L: same
        progress += drawSpeed * dt;
        if (progress >= 1) {
          progress = 1;
          phase = (phase === 2) ? 3 : 7;
          phaseTime = 0;
        }
        tailIdx = Math.round(progress * numPts);
        headIdx = numPts;
        drawSegment(path, tailIdx, headIdx);
        break;

      case 3: // Pause before R→L
      case 7: // Pause before L→R
        ctx.clearRect(0, 0, W, H);
        if (phaseTime >= pauseDuration) {
          phase = (phase === 3) ? 4 : 0;
          phaseTime = 0;
          progress = 0;
        }
        break;
    }

    var label = document.getElementById('phaseLabel');
    if (label) label.textContent = 'Phase: ' + phaseNames[phase];

    snakeAnim = requestAnimationFrame(animate);
  }

  function drawSegment(path, startIdx, endIdx) {
    ctx.clearRect(0, 0, W, H);
    if (endIdx <= startIdx) return;

    var len = endIdx - startIdx;

    ctx.lineWidth = lineW;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    // Draw with gradient: head = full opacity, tail = faded
    for (var i = startIdx + 1; i <= endIdx; i++) {
      // Position within the visible segment (0 = tail, 1 = head)
      var posInSegment = (i - startIdx) / len;
      var alpha = 0.3 + posInSegment * 0.7; // tail=0.3, head=1.0
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = teal;
      ctx.beginPath();
      ctx.moveTo(path[i-1].x, path[i-1].y);
      ctx.lineTo(path[i].x, path[i].y);
      ctx.stroke();
    }

    // Head dot
    ctx.globalAlpha = 1;
    ctx.fillStyle = teal;
    ctx.beginPath();
    ctx.arc(path[endIdx].x, path[endIdx].y, lineW / 2 + 1, 0, Math.PI * 2);
    ctx.fill();

    ctx.globalAlpha = 1;
  }

  function drawGlowingM(t) {
    ctx.clearRect(0, 0, W, H);

    // Pulse: sin wave cycles over ~800ms for a smooth breathe
    var pulse = Math.sin(t * Math.PI * 2 / 800);
    var glowRadius = 8 + pulse * 5; // 3-13px glow
    var glowAlpha = 0.12 + pulse * 0.08; // 0.04-0.20

    // Draw glow layer (thicker, transparent)
    ctx.strokeStyle = teal;
    ctx.lineWidth = lineW + glowRadius;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.globalAlpha = glowAlpha;
    ctx.beginPath();
    ctx.moveTo(mPts[0].x, mPts[0].y);
    for (var i = 1; i < mPts.length; i++) ctx.lineTo(mPts[i].x, mPts[i].y);
    ctx.stroke();

    // Draw solid M on top
    ctx.lineWidth = lineW;
    ctx.globalAlpha = 1;
    ctx.beginPath();
    ctx.moveTo(mPts[0].x, mPts[0].y);
    for (var i = 1; i < mPts.length; i++) ctx.lineTo(mPts[i].x, mPts[i].y);
    ctx.stroke();

    ctx.globalAlpha = 1;
  }

  function drawFullM() {
    ctx.clearRect(0, 0, W, H);
    ctx.strokeStyle = teal;
    ctx.lineWidth = lineW;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.globalAlpha = 1;
    ctx.beginPath();
    ctx.moveTo(mPts[0].x, mPts[0].y);
    for (var i = 1; i < mPts.length; i++) ctx.lineTo(mPts[i].x, mPts[i].y);
    ctx.stroke();
  }

  running = true;
  forceM = false;
  snakeAnim = requestAnimationFrame(animate);

  return {
    stop: function() { running = false; if (snakeAnim) cancelAnimationFrame(snakeAnim); },
    showM: function() { forceM = true; }
  };
}

function restart() { if (ctrl) ctrl.stop(); ctrl = startSnakeAnimation(); }
ctrl = startSnakeAnimation();
</script>
</body>
</html>
