<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Snake M Animation Test</title>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    background: #f5f5f5;
    font-family: Inter, sans-serif;
  }
  .verify-icon-wrap {
    width: 80px;
    height: 80px;
    background: #eef8f6;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
  }
  canvas { width: 64px; height: 64px; display: block; }
  .controls { margin-top: 24px; display: flex; gap: 10px; }
  button {
    padding: 8px 20px; border: none; border-radius: 8px;
    background: #0e7c6b; color: white; font-size: 14px; cursor: pointer;
  }
  button:hover { opacity: 0.9; }
  .label { color: #666; font-size: 13px; margin-top: 8px; }
  .badge-test {
    margin-top: 40px; padding: 30px; background: white;
    border-radius: 16px; text-align: center;
  }
  .benefits-badge-centered {
    display: inline-flex; align-items: center; justify-content: center;
    width: 52px; height: 52px; background: #eef8f6; border-radius: 14px;
  }
</style>
</head>
<body>

<h3 style="color:#0f2b3c; margin-bottom:4px;">Snake M Animation v4</h3>
<p class="label">M inside circle. Bezier bridges. No overlap.</p>

<div class="verify-icon-wrap">
  <canvas id="snakeCanvas" width="128" height="128"></canvas>
</div>
<p class="label" id="phaseLabel">Phase: spinning</p>

<div class="controls">
  <button onclick="restart()">Restart</button>
  <button onclick="ctrl.showM()">Force M</button>
</div>

<div class="badge-test">
  <p class="label" style="margin-bottom:12px">Benefits Badge:</p>
  <div class="benefits-badge-centered">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#0e7c6b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="3"/>
      <path d="M9 12l2 2 4-4"/>
    </svg>
  </div>
</div>

<script>
var ctrl, snakeAnim;

function startSnakeAnimation() {
  var canvas = document.getElementById('snakeCanvas');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var W = 128, H = 128;
  var cx = 64, cy = 64, r = 46; // BIGGER circle
  var teal = '#0e7c6b';
  var lineW = 6;

  // M shape — SCALED TO FIT INSIDE the circle (max distance from center ~40, circle radius 46)
  var mPts = [
    {x: 34, y: 88},  // bottom-left
    {x: 34, y: 40},  // top-left
    {x: 64, y: 67},  // center-bottom (V)
    {x: 94, y: 40},  // top-right
    {x: 94, y: 88}   // bottom-right
  ];

  function dist(a, b) { return Math.sqrt((b.x-a.x)*(b.x-a.x) + (b.y-a.y)*(b.y-a.y)); }

  // M path segments
  var mSegLens = [], totalMLen = 0;
  for (var i = 1; i < mPts.length; i++) {
    var d = dist(mPts[i-1], mPts[i]);
    mSegLens.push(d);
    totalMLen += d;
  }

  function mPointAtDist(d) {
    d = Math.max(0, Math.min(d, totalMLen));
    var acc = 0;
    for (var i = 0; i < mSegLens.length; i++) {
      if (acc + mSegLens[i] >= d) {
        var f = (d - acc) / mSegLens[i];
        return {x: mPts[i].x + (mPts[i+1].x - mPts[i].x)*f, y: mPts[i].y + (mPts[i+1].y - mPts[i].y)*f};
      }
      acc += mSegLens[i];
    }
    return {x: mPts[4].x, y: mPts[4].y};
  }

  function circlePoint(a) { return {x: cx + r*Math.cos(a), y: cy + r*Math.sin(a)}; }

  // --- Cubic bezier ---
  function bezier(p0, p1, p2, p3, t) {
    var u = 1-t;
    return {
      x: u*u*u*p0.x + 3*u*u*t*p1.x + 3*u*t*t*p2.x + t*t*t*p3.x,
      y: u*u*u*p0.y + 3*u*u*t*p1.y + 3*u*t*t*p2.y + t*t*t*p3.y
    };
  }

  // --- Entry bridge: circle → M start ---
  // Entry angle: ~2.0 rad (bottom-left of circle, "low to the ground")
  var entryAngle = 2.0;
  var entryCircle = circlePoint(entryAngle);
  // Circle tangent at entry (clockwise = increasing angle)
  // velocity dir: (-sin(a), cos(a))
  var entryTan = {x: -Math.sin(entryAngle), y: Math.cos(entryAngle)};
  var entryScale = 15;
  var entryP0 = entryCircle;
  var entryP1 = {x: entryP0.x + entryTan.x*entryScale, y: entryP0.y + entryTan.y*entryScale};
  // M start tangent: first segment (34,88)→(34,40) = direction (0,-1). Control comes from below.
  var entryP2 = {x: mPts[0].x, y: mPts[0].y + entryScale};
  var entryP3 = mPts[0];

  function entryBridgePt(t) { return bezier(entryP0, entryP1, entryP2, entryP3, t); }

  // Entry bridge length
  var entryBridgeLen = 0;
  var prev = entryP0;
  for (var i = 1; i <= 30; i++) {
    var p = entryBridgePt(i/30);
    entryBridgeLen += dist(prev, p);
    prev = p;
  }

  // --- Exit bridge: M end → circle ---
  // Exit angle: ~0.675 rad (bottom-right of circle)
  var exitAngle = 0.675;
  var exitCircle = circlePoint(exitAngle);
  var exitP0 = mPts[4]; // M end
  // M end tangent: last segment (94,40)→(94,88) = direction (0,1) = downward. Control below M end.
  var exitScale = 15;
  var exitP1 = {x: mPts[4].x, y: mPts[4].y + exitScale};
  // Circle tangent at exit (going INTO the circle, reverse of velocity)
  var exitTan = {x: Math.sin(exitAngle), y: -Math.cos(exitAngle)}; // reverse of velocity
  var exitP2 = {x: exitCircle.x + exitTan.x*exitScale, y: exitCircle.y + exitTan.y*exitScale};
  var exitP3 = exitCircle;

  function exitBridgePt(t) { return bezier(exitP0, exitP1, exitP2, exitP3, t); }

  // Exit bridge length
  var exitBridgeLen = 0;
  prev = exitP0;
  for (var i = 1; i <= 30; i++) {
    var p = exitBridgePt(i/30);
    exitBridgeLen += dist(prev, p);
    prev = p;
  }

  // --- Animation state ---
  var trailLen = 65;
  var trail = [];
  var headAngle = exitAngle; // start from where exit would be
  var circleSpeed = Math.PI * 1.4 / 1000; // rad/ms
  var linearSpeed = circleSpeed * r; // px/ms — SAME speed everywhere for consistency
  var mDist = 0, bridgeDist = 0;

  // Phases: 0=spin, 1=entryBridge, 2=traceM, 3=holdM, 4=exitBridge
  var phase = 0;
  var phaseTime = 0;
  var minSpinTime = 1200; // ms before allowing M entry
  var holdDuration = 1400;
  var lastTime = 0;
  var running = true, forceM = false;

  // Init trail on circle
  for (var i = 0; i < trailLen; i++) {
    var a = headAngle - (i / trailLen) * Math.PI * 1.3;
    trail.push(circlePoint(a));
  }

  var phaseNames = ['spinning', 'entering M', 'tracing M', 'hold M', 'exiting M'];

  function animate(time) {
    if (!running) return;
    if (!lastTime) lastTime = time;
    var dt = Math.min(time - lastTime, 50);
    lastTime = time;

    if (forceM) { drawStaticM(); snakeAnim = requestAnimationFrame(animate); return; }

    phaseTime += dt;
    var headPos = null;
    var addToTrail = true;

    switch (phase) {
      case 0: // Spin on circle
        var prevAngle = headAngle;
        headAngle += circleSpeed * dt;
        headPos = circlePoint(headAngle);

        // After min spin time, enter M when head passes entry angle
        if (phaseTime > minSpinTime) {
          var prevMod = ((prevAngle % (2*Math.PI)) + 4*Math.PI) % (2*Math.PI);
          var currMod = ((headAngle % (2*Math.PI)) + 4*Math.PI) % (2*Math.PI);
          var entryMod = ((entryAngle % (2*Math.PI)) + 4*Math.PI) % (2*Math.PI);

          var crossed = false;
          if (currMod >= prevMod) {
            crossed = entryMod >= prevMod && entryMod <= currMod;
          } else {
            crossed = entryMod >= prevMod || entryMod <= currMod;
          }

          if (crossed) {
            // Snap to entry angle for perfect alignment
            headAngle = entryAngle;
            headPos = circlePoint(entryAngle);
            // Recompute entry bridge from this exact point
            entryP0 = headPos;
            entryP1 = {x: entryP0.x + entryTan.x*entryScale, y: entryP0.y + entryTan.y*entryScale};
            entryBridgeLen = 0;
            var pr = entryP0;
            for (var j = 1; j <= 30; j++) {
              var pp = entryBridgePt(j/30);
              entryBridgeLen += dist(pr, pp);
              pr = pp;
            }
            phase = 1;
            phaseTime = 0;
            bridgeDist = 0;
          }
        }
        break;

      case 1: // Entry bridge (bezier: circle → M start)
        bridgeDist += linearSpeed * dt;
        var t = Math.min(bridgeDist / entryBridgeLen, 1);
        headPos = entryBridgePt(t);
        if (t >= 1) {
          phase = 2;
          phaseTime = 0;
          mDist = 0;
        }
        break;

      case 2: // Trace M path
        mDist += linearSpeed * dt;
        if (mDist >= totalMLen) {
          headPos = mPointAtDist(totalMLen);
          phase = 3;
          phaseTime = 0;
          settleTrailToM();
          addToTrail = false;
        } else {
          headPos = mPointAtDist(mDist);
        }
        break;

      case 3: // Hold M
        addToTrail = false;
        if (phaseTime >= holdDuration) {
          phase = 4;
          phaseTime = 0;
          bridgeDist = 0;
        }
        break;

      case 4: // Exit bridge (bezier: M end → circle)
        bridgeDist += linearSpeed * dt;
        var t = Math.min(bridgeDist / exitBridgeLen, 1);
        headPos = exitBridgePt(t);
        if (t >= 1) {
          headAngle = exitAngle;
          phase = 0;
          phaseTime = 0;
        }
        break;
    }

    if (addToTrail && headPos) {
      trail.unshift(headPos);
      if (trail.length > trailLen) trail.pop();
    }

    drawSnake(trail);

    var label = document.getElementById('phaseLabel');
    if (label) label.textContent = 'Phase: ' + phaseNames[phase];

    snakeAnim = requestAnimationFrame(animate);
  }

  function settleTrailToM() {
    trail = [];
    for (var i = 0; i < trailLen; i++) {
      var d = totalMLen * (1 - i / (trailLen - 1));
      trail.push(mPointAtDist(d));
    }
  }

  function drawSnake(pts) {
    ctx.clearRect(0, 0, W, H);
    if (pts.length < 2) return;

    ctx.lineWidth = lineW;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    for (var i = 1; i < pts.length; i++) {
      var alpha = 1 - (i / pts.length) * 0.55;
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = teal;
      ctx.beginPath();
      ctx.moveTo(pts[i-1].x, pts[i-1].y);
      ctx.lineTo(pts[i].x, pts[i].y);
      ctx.stroke();
    }

    // Head dot
    ctx.globalAlpha = 1;
    ctx.fillStyle = teal;
    ctx.beginPath();
    ctx.arc(pts[0].x, pts[0].y, lineW / 2 + 1, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawStaticM() {
    ctx.clearRect(0, 0, W, H);
    ctx.strokeStyle = teal;
    ctx.lineWidth = lineW;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.globalAlpha = 1;
    ctx.beginPath();
    ctx.moveTo(mPts[0].x, mPts[0].y);
    for (var i = 1; i < mPts.length; i++) ctx.lineTo(mPts[i].x, mPts[i].y);
    ctx.stroke();
  }

  running = true;
  forceM = false;
  snakeAnim = requestAnimationFrame(animate);

  return {
    stop: function() { running = false; if (snakeAnim) cancelAnimationFrame(snakeAnim); },
    showM: function() { forceM = true; }
  };
}

function restart() { if (ctrl) ctrl.stop(); ctrl = startSnakeAnimation(); }
ctrl = startSnakeAnimation();
</script>
</body>
</html>
